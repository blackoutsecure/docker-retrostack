name: retrostack
description: >-
  RetroStack: a modular Docker platform providing scalable, multi‑emulator
  support for retro gaming. Run RetroArch, PPSSPP, or Dolphin standalone
  or as composable services. Features multi-arch images, profile-based
  emulator selection, persistent config/saves, gamepad auto-detection,
  and optional EmulationStation-DE integration. Available as individual
  Balena blocks — compose only the emulators you need.

  Docker Hub: blackoutsecure/retrostack

  Repository: https://github.com/blackoutsecure/docker-retrostack

version: 1.0.0
type: sw.block

assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-retrostack'

data:
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - genericx86-64-ext
    - intel-nuc
    - raspberrypi4-64
    - raspberrypi400-64

post-provisioning: >-
  ## Emulator Provider Containers

  These containers run emulators directly — either standalone or triggered
  by [docker-emulationstation-de](https://github.com/blackoutsecure/docker-emulationstation-de)
  when a game is selected.

  ### Available Emulators

  - **retroarch** — RetroArch + libretro cores (multi-system)
  - **ppsspp** — PPSSPP (PlayStation Portable)
  - **dolphin-emu** — Dolphin (GameCube / Wii)

  ### Usage

  Pick a profile:

    docker compose --profile retroarch up -d
    docker compose --profile all up -d

  Docker Hub: [blackoutsecure/retrostack](https://hub.docker.com/r/blackoutsecure/retrostack)

  Repository: https://github.com/blackoutsecure/docker-retrostack

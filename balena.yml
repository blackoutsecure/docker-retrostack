name: retrostack
description: >-
  RetroStack: a modular Docker platform providing scalable, multi-emulator
  support for retro gaming. Available as individual Balena blocks.
  Docker Hub: blackoutsecure/docker-retrostack
  Repository: https://github.com/blackoutsecure/docker-retrostack
version: 1.0.0
type: sw.block
assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-retrostack'
  logo:
    type: blob.asset
    data:
      url: 'https://raw.githubusercontent.com/blackoutsecure/docker-retrostack/main/logo.png'
data:
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - genericx86-64-ext
    - intel-nuc
    - raspberrypi4-64
    - raspberrypi400-64

post-provisioning: >-
  RetroStack emulator containers. Pick a profile:
  `docker compose --profile retroarch up -d` or `--profile all`.
  Docker Hub: https://hub.docker.com/r/blackoutsecure/docker-retrostack

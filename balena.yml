name: esde-emulator-provider
description: >-
  Emulator runtime containers for docker-emulationstation-de.
  Each container runs a fully installed emulator (RetroArch, PPSSPP, Dolphin)
  that listens on a FIFO control pipe for game launch commands from ES-DE.
  Binaries stay inside the container. Available as individual Balena blocks —
  compose only the emulators you need.

  Docker Hub: blackoutsecure/esde-emulator-provider

  Repository: https://github.com/blackoutsecure/docker-emulationstation-de-emulator-provider

version: 1.0.0
type: sw.block

assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-emulationstation-de-emulator-provider'

data:
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - genericx86-64-ext
    - intel-nuc
    - raspberrypi4-64
    - raspberrypi400-64

post-provisioning: >-
  ## Emulator Provider Containers

  These containers run emulators directly — either standalone or triggered
  by [docker-emulationstation-de](https://github.com/blackoutsecure/docker-emulationstation-de)
  when a game is selected.

  ### Available Emulators

  - **retroarch** — RetroArch + libretro cores (multi-system)
  - **ppsspp** — PPSSPP (PlayStation Portable)
  - **dolphin-emu** — Dolphin (GameCube / Wii)

  ### Usage

  Pick a profile:

    docker compose --profile retroarch up -d
    docker compose --profile all up -d

  Docker Hub: [blackoutsecure/esde-emulator-provider](https://hub.docker.com/r/blackoutsecure/esde-emulator-provider)

  Repository: https://github.com/blackoutsecure/docker-emulationstation-de-emulator-provider

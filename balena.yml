name: esde-emulator-provider
description: >-
  Emulator sidecar init-containers for docker-emulationstation-de.
  Each block provisions an emulator binary (RetroArch, PPSSPP, or Dolphin)
  onto a shared volume for ES-DE to launch games from.
  Available as individual Balena blocks — compose only the emulators you need.

version: 1.0.0
type: sw.block

assets:
  repository:
    type: blob.asset
    data:
      url: 'https://github.com/blackoutsecure/docker-emulationstation-de-emulator-provider'

data:
  defaultDeviceType: raspberrypi4-64
  supportedDeviceTypes:
    - genericx86-64-ext
    - intel-nuc
    - raspberrypi4-64
    - raspberrypi400-64

post-provisioning: >-
  ## Emulator Provider Blocks

  These init-containers provision emulator binaries onto a shared volume.
  Use them alongside the main
  [docker-emulationstation-de](https://github.com/blackoutsecure/docker-emulationstation-de)
  block.

  ### Available Emulators

  - **retroarch** — RetroArch + libretro cores (multi-system)
  - **ppsspp** — PPSSPP (PlayStation Portable)
  - **dolphin-emu** — Dolphin (GameCube / Wii)

  Each emulator is published as a separate Balena block. Add the
  emulator services to your fleet compose alongside ES-DE, sharing
  the `esde-emulators` volume.

  Docker Hub: [blackoutsecure/esde-emulator-provider](https://hub.docker.com/r/blackoutsecure/esde-emulator-provider)

  Repository: https://github.com/blackoutsecure/docker-emulationstation-de-emulator-provider

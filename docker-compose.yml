x-common: &common
  restart: unless-stopped
  tmpfs:
    - /var/tmp
    - /run:exec
  shm_size: 1gb
  read_only: false
  labels:
    io.balena.features.kernel-modules: '1'
    io.balena.features.firmware: '1'
    io.balena.features.dbus: '1'
  volumes:
    - retrostack-emulator-control:/run/retrostack-emulators
    - retrostack-shared:/run/retrostack-shared:ro
    - emulationstation-config:/config
    - emulationstation-roms:/roms:ro
    - emulationstation-bios:/bios:ro
    - x11-unix:/tmp/.X11-unix:ro
    - pulse-socket:/run/pulse:ro
  devices:
    - /dev/dri:/dev/dri
    - /dev/input:/dev/input
    - /dev/snd:/dev/snd

services:
  retroarch:
    <<: *common
    profiles: [retroarch, all]
    build:
      context: .
      target: retroarch
    image: docker.io/blackoutsecure/retrostack:retroarch
    container_name: retrostack-retroarch
    environment:
      DISPLAY: ':0'
      PULSE_SERVER: 'unix:/run/pulse/native'

  ppsspp:
    <<: *common
    profiles: [ppsspp, all]
    build:
      context: .
      target: ppsspp
    image: docker.io/blackoutsecure/retrostack:ppsspp
    container_name: retrostack-ppsspp
    environment:
      DISPLAY: ':0'
      PULSE_SERVER: 'unix:/run/pulse/native'

  dolphin-emu:
    <<: *common
    profiles: [dolphin, all]
    build:
      context: .
      target: dolphin-emu
    image: docker.io/blackoutsecure/retrostack:dolphin-emu
    container_name: retrostack-dolphin-emu
    environment:
      DISPLAY: ':0'
      PULSE_SERVER: 'unix:/run/pulse/native'

volumes:
  emulationstation-config:
  emulationstation-roms:
  emulationstation-bios:
  retrostack-emulator-control:   # FIFO control pipes — ES-DE writes launch commands, emulators read them
  retrostack-shared:             # Shared runtime — gamepad mappings, Xauthority
  x11-unix:                      # X11 socket shared between ES-DE and emulators
  pulse-socket:                  # PulseAudio socket shared with emulators

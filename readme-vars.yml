project_name: retrostack
project_url: "https://github.com/blackoutsecure/docker-retrostack"
project_blurb: |
  RetroStack: a modular Docker platform providing scalable, multi-emulator support for retro gaming.
  Sponsored and maintained by [Blackout Secure](https://blackoutsecure.app/).
project_lsio_github_repo_url: "https://github.com/blackoutsecure/docker-retrostack"
project_categories: "Emulation,Games"

available_architectures:
  - {arch: "{{ arch_x86_64 }}", tag: "retroarch-amd64"}
  - {arch: "{{ arch_arm64 }}", tag: "retroarch-arm64"}

common_param_env_vars_enabled: true
param_container_name: "retrostack-retroarch"
param_usage_include_vols: true
param_volumes:
  - {vol_path: "/config", vol_host_path: "retrostack-config", desc: "Persistent emulator settings, saves, and states"}
  - {vol_path: "/roms", vol_host_path: "retrostack-roms", desc: "ROM library mount"}
  - {vol_path: "/bios", vol_host_path: "retrostack-bios", desc: "BIOS files for emulator backends"}
  - {vol_path: "/tmp/.X11-unix", vol_host_path: "x11-unix", desc: "X11 socket for display"}
  - {vol_path: "/run/pulse", vol_host_path: "pulse-socket", desc: "PulseAudio socket"}
param_usage_include_net: false
param_usage_include_env: true
param_env_vars:
  - {env_var: "DISPLAY", env_value: ":0", desc: "X11 display"}
  - {env_var: "PULSE_SERVER", env_value: "unix:/run/pulse/native", desc: "PulseAudio server path"}
  - {env_var: "XDG_RUNTIME_DIR", env_value: "/run/retrostack", desc: "Runtime directory for display/session"}
opt_param_usage_include_env: true
opt_param_env_vars:
  - {env_var: "EMULATOR_CORE", env_value: "", desc: "Default libretro core for RetroArch"}
  - {env_var: "RETROSTACK_EMULATORS_CONTROL", env_value: "/run/retrostack-emulators", desc: "Control pipe directory"}
  - {env_var: "RETROSTACK_IDLE_TIMEOUT", env_value: "600", desc: "Seconds to wait for a launch command before exiting (default: 600, 0 = disabled)"}
  - {env_var: "RETROSTACK_FRONTEND_MODE", env_value: "standalone", desc: "standalone (default) launches the emulator GUI; daemon listens on FIFO for ES-DE integration"}

app_setup_block_enabled: true
app_setup_block: |
  Standalone mode (default): launches the emulator's own GUI directly.
  Set `RETROSTACK_FRONTEND_MODE=daemon` for ES-DE integration (FIFO control pipe mode).
  In daemon mode, the container exits automatically after the emulator process ends, or after an idle
  timeout (default 600s / 10 min, configurable via `RETROSTACK_IDLE_TIMEOUT`; set to `0` to disable).
  Config persistence: `/config/<emulator-name>/`. Device passthrough: `/dev/dri`, `/dev/input`, `/dev/snd`.

readonly_supported: false
nonroot_supported: true
